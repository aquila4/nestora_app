<!DOCTYPE html>
<html>
<head>
    <title>Login - Nestora</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
        }

        body {
            margin: 0;
            background: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 30px;
        }

        .logo {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #ff385c;
            margin-bottom: 10px;
        }

        h2 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 5px;
            color: #111;
        }

        p {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid #e5e5e5;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #ff385c;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #ff385c;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }

        .footer a {
            color: #ff385c;
            text-decoration: none;
            font-weight: 600;
        }

        .card {
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="logo">Nestora</div>

    <h2>Welcome back</h2>
    <p>Login to manage your properties</p>

    <form method="POST" class="card">

        <input type="email" name="email" placeholder="Email Address" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Log in</button>

    </form>

    <div class="footer">
        Don’t have an account? <a href="/register">Sign up</a>
    </div>

</div>

</body>
</html>

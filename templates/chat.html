<!DOCTYPE html>
<html>
<head>
    <title>Chat - UseNestora</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
        }

        body {
            margin: 0;
            background: #f7f7f7;
        }

        /* WRAPPER */
        .wrapper {
            max-width: 900px;
            margin: auto;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* HEADER */
        .header {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .name {
            font-weight: 600;
        }

        .sub {
            font-size: 12px;
            color: gray;
        }

        /* CHAT AREA */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* MESSAGES */
        .msg {
            padding: 10px 14px;
            border-radius: 18px;
            margin-bottom: 10px;
            max-width: 70%;
            font-size: 14px;
        }

        .me {
            background: #ff385c;
            color: white;
            margin-left: auto;
        }

        .other {
            background: white;
            border: 1px solid #eee;
        }

        /* INPUT */
        .input-area {
            background: white;
            padding: 10px;
            border-top: 1px solid #eee;
        }

        .input-box {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #ddd;
            outline: none;
        }

        button {
            background: #ff385c;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 20px;
            cursor: pointer;
        }

    </style>
</head>

<body>

<div class="wrapper">

    <!-- HEADER -->
    <div class="header">

        <!-- AGENT IMAGE -->
        <img class="avatar"
             src="{{ url_for('static', filename='avatars/' + (chat_agent.profile_image or 'default.png')) }}">

        <div>
            <div class="name">{{ chat_agent.name }}</div>
            <div class="sub">Property #{{ chat.property_id }}</div>
        </div>

    </div>

    <!-- CHAT -->
    <div class="chat-box">

        {% for msg in messages %}

            {% if msg.sender_id == current_user.id %}
                <div class="msg me">
                    {{ msg.text }}
                </div>
            {% else %}
                <div class="msg other">
                    {{ msg.text }}
                </div>
            {% endif %}

        {% endfor %}

    </div>

    <!-- INPUT -->
    <div class="input-area">
        <form method="POST" action="/send_message/{{ chat.id }}">
            <div class="input-box">
                <input type="text" name="message" placeholder="Type a message..." required>
                <button type="submit">Send</button>
            </div>
        </form>
    </div>

</div>

</body>
</html>

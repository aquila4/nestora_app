<h2 style="font-size:22px; font-weight:700; margin-bottom:20px;">
    📜 Property Edit History
</h2>

<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:16px;">

{% for h in history %}

<div style="
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
    transition:0.3s;
">

    <!-- TOP STRIP -->
    <div style="height:6px; background:linear-gradient(90deg,#ff385c,#ff7a59);"></div>

    <div style="padding:15px;">

        <h3 style="margin:0; font-size:16px; font-weight:600;">
            {{ h.title }}
        </h3>

        <p style="margin:6px 0; font-weight:700; color:#111;">
            ₦{{ h.price }}
        </p>

        <p style="font-size:13px; color:#666;">
            📍 {{ h.location }}
        </p>

        <p style="font-size:13px; color:#777; margin-top:8px; line-height:1.4;">
            {{ h.description }}
        </p>

        <p style="font-size:11px; color:#999; margin-top:10px;">
            Edited: {{ h.edited_at }}
        </p>

        <a href="/property/restore/{{ h.id }}"
           style="
            display:block;
            text-align:center;
            margin-top:12px;
            background:#111;
            color:#fff;
            padding:10px;
            border-radius:10px;
            text-decoration:none;
            font-size:13px;
        ">
            Restore
        </a>

    </div>

</div>

{% endfor %}

</div>

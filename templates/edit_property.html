<!DOCTYPE html>
<html>
<head>
    <title>Edit Property - Nestora</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f6f7;
            margin: 0;
        }

        .container {
            width: 50%;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            background: black;
            color: white;
            border: none;
            margin-top: 15px;
            cursor: pointer;
        }

        img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 8px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="title">✏️ Edit Property</div>

    <form method="POST" enctype="multipart/form-data">

        <input type="text" name="title" value="{{ property.title }}" required>

        <input type="text" name="location" value="{{ property.location }}" required>

        <input type="number" name="price" value="{{ property.price }}" required>

        <textarea name="description" rows="4">{{ property.description }}</textarea>

        <p><b>Current Image</b></p>

        {% if property.image %}
            <img src="{{ url_for('static', filename='uploads/' + property.image) }}">
        {% else %}
            <img src="{{ url_for('static', filename='uploads/default.jpg') }}">
        {% endif %}

        <input type="file" name="image">

        <button type="submit">Update Property</button>

    </form>

</div>

</body>
</html>

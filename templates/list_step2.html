<!DOCTYPE html>
<html>
<head>
  <title>Step 2 - Location</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

  <h1 class="text-2xl font-bold mb-2">Where is the property located?</h1>
  <p class="text-gray-500 mb-6">Step 2 of 5</p>

  <form method="POST" class="space-y-4">

    <input name="location"
           placeholder="e.g. Lekki, Lagos"
           class="w-full border p-3 rounded-lg"
           required>

    <button class="w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800">
      Continue
    </button>

  </form>

</div>

</body>
</html>

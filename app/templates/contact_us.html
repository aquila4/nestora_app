<!DOCTYPE html>
<html>
<head>
  <title>Contact Us - Nestora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #fff;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 50px 20px;
    }

    h1 {
      font-size: 30px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      background: #000;
      color: #fff;
      padding: 14px;
      border: none;
      border-radius: 999px;
      width: 100%;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .info {
      margin-top: 30px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Contact Us</h1>
  <p>We usually reply within 24 hours.</p>

  <form>
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Email">
    <textarea rows="5" placeholder="Message"></textarea>
    <button type="submit">Send Message</button>
  </form>

  <div class="info">
    📧 nestoratechnology@gmail.com <br>
    📞 +234 901 890 7979
  </div>

</div>

</body>
</html>

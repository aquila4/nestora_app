<!DOCTYPE html>
<html>
<head>
  <title>Step 1 - Property Type</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

  <h1 class="text-2xl font-bold mb-2">What type of property is it?</h1>
  <p class="text-gray-500 mb-6">Step 1 of 5</p>

  <form method="POST" class="space-y-4">

    <!-- PROPERTY TYPE -->
    <div>
      <label class="block text-sm font-medium mb-1">Property Type</label>

      <select name="property_type"
              id="property_type"
              onchange="toggleBedrooms()"
              class="w-full border rounded-lg p-3"
              required>
        <option value="house">House</option>
        <option value="apartment">Apartment</option>
        <option value="land">Land</option>
      </select>
    </div>

    <!-- BEDROOMS -->
    <div id="bedroomsBox">
      <label class="block text-sm font-medium mb-1">Bedrooms</label>

      <input type="number"
             id="bedrooms"
             name="bedrooms"
             class="w-full border rounded-lg p-3"
             placeholder="e.g. 3"
             min="1">
    </div>

    <button class="w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800">
      Continue
    </button>

  </form>

</div>

<script>
function toggleBedrooms() {
    let type = document.getElementById("property_type").value;
    let box = document.getElementById("bedroomsBox");
    let input = document.getElementById("bedrooms");

    if (type === "land") {
        box.style.display = "none";
        input.value = "";          // clear value
        input.disabled = true;     // prevent submission
    } else {
        box.style.display = "block";
        input.disabled = false;
    }
}

// run on load
window.onload = toggleBedrooms;
</script>

</body>
</html>
